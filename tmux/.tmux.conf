# General
set-option -g history-limit 100000
set -g mouse on


set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-256color:RGB"


# Estilo general de barra
set -g status on
set -g status-interval 5
set -g status-justify centre
set -g status-left-length 40
set -g status-right-length 100

# Colores Night Owl
set -g status-style "bg=#011627,fg=#d6deeb"

# Separadores Powerline
set -g status-left "#[fg=#addb67]VPS: #[fg=#addb67]#H #[fg=#011627,bg=#addb67,nobold] #[fg=#011627]Sesion: #[fg=#011627]#S #[fg=#011627,bg=#addb67,nobold]#[fg=#011627,bg=#addb67] #(whoami) #[fg=#addb67,bg=#011627]"
set -g status-right "#[fg=#82aaff,bg=#011627]#[fg=#011627,bg=#82aaff] %Y-%m-%d #[fg=#011627,bg=#82aaff,nobold]#[fg=#d6deeb,bg=#011627] %H:%M "

# Colores de ventanas
set -g window-status-current-style "bg=#82aaff,fg=#011627,bold"
set -g window-status-style "bg=#011627,fg=#d6deeb"
set -g window-status-format " #I #W "
set -g window-status-current-format " #I #W "

# Panel activo
set -g pane-border-style "fg=#011627"
set -g pane-active-border-style "fg=#addb67"

# Mensajes
set -g message-style "bg=#011627,fg=#addb67"
set -g message-command-style "bg=#011627,fg=#82aaff"

# Evitar recarga múltiple
run-shell "tmux show-option -gqv @nightowl_loaded || tmux set -g @nightowl_loaded 1"

# --- Atajos y mejoras útiles ---
# Remap prefix a Ctrl-a (opcional)
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Divisiones rápidas
bind | split-window -h
bind - split-window -v

# Navegación con vim-like keys entre paneles
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Redimensionar paneles con Alt + hjkl
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

# Recargar configuración rápidamente
bind r source-file ~/.tmux.conf \; display-message "tmux: configuración recargada"

# Cierre rápido de ventana
bind x confirm-before -p "Cierra la ventana #W? (y/n)" kill-window

# Mostrar el usuario y host en la línea de estado (ya incluido pero reforzado)
set -g status-left "#[fg=#addb67]#(whoami)@#H #[fg=#011627,bg=#addb67]"
